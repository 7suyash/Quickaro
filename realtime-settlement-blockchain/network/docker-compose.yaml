# =============================================================================
# Real-Time Settlement Blockchain Network - Docker Compose
# =============================================================================
# Defines the Hyperledger Fabric network topology with:
#   - 1 Orderer (Raft consensus)
#   - 5 Peer nodes (Exchange, Broker, Bank, Clearing, Regulator)
#   - 5 Certificate Authorities
#   - CouchDB state databases for rich queries
# =============================================================================

version: '3.7'

volumes:
  orderer.settlement.com:
  peer0.exchange.settlement.com:
  peer0.broker.settlement.com:
  peer0.bank.settlement.com:
  peer0.clearing.settlement.com:
  peer0.regulator.settlement.com:

networks:
  settlement-network:
    name: settlement-network

services:

  # ---------------------------------------------------------------------------
  # Orderer
  # ---------------------------------------------------------------------------
  orderer.settlement.com:
    container_name: orderer.settlement.com
    image: hyperledger/fabric-orderer:2.5
    environment:
      - FABRIC_LOGGING_SPEC=INFO
      - ORDERER_GENERAL_LISTENADDRESS=0.0.0.0
      - ORDERER_GENERAL_LISTENPORT=7050
      - ORDERER_GENERAL_LOCALMSPID=OrdererMSP
      - ORDERER_GENERAL_LOCALMSPDIR=/var/hyperledger/orderer/msp
      - ORDERER_GENERAL_TLS_ENABLED=true
      - ORDERER_GENERAL_TLS_PRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_TLS_CERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_TLS_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
      - ORDERER_GENERAL_BOOTSTRAPMETHOD=file
      - ORDERER_GENERAL_BOOTSTRAPFILE=/var/hyperledger/orderer/orderer.genesis.block
      - ORDERER_GENERAL_CLUSTER_CLIENTCERTIFICATE=/var/hyperledger/orderer/tls/server.crt
      - ORDERER_GENERAL_CLUSTER_CLIENTPRIVATEKEY=/var/hyperledger/orderer/tls/server.key
      - ORDERER_GENERAL_CLUSTER_ROOTCAS=[/var/hyperledger/orderer/tls/ca.crt]
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric
    command: orderer
    volumes:
      - ../organizations/ordererOrg/orderers/orderer.settlement.com/msp:/var/hyperledger/orderer/msp
      - ../organizations/ordererOrg/orderers/orderer.settlement.com/tls:/var/hyperledger/orderer/tls
      - orderer.settlement.com:/var/hyperledger/production/orderer
    ports:
      - 7050:7050
    networks:
      - settlement-network

  # ---------------------------------------------------------------------------
  # Certificate Authorities
  # ---------------------------------------------------------------------------
  ca.exchange.settlement.com:
    container_name: ca.exchange.settlement.com
    image: hyperledger/fabric-ca:1.5
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-exchange
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - 7054:7054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../organizations/exchangeOrg/ca:/etc/hyperledger/fabric-ca-server
    networks:
      - settlement-network

  ca.broker.settlement.com:
    container_name: ca.broker.settlement.com
    image: hyperledger/fabric-ca:1.5
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-broker
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=8054
    ports:
      - 8054:8054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../organizations/brokerOrg/ca:/etc/hyperledger/fabric-ca-server
    networks:
      - settlement-network

  ca.bank.settlement.com:
    container_name: ca.bank.settlement.com
    image: hyperledger/fabric-ca:1.5
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-bank
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=9054
    ports:
      - 9054:9054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../organizations/bankOrg/ca:/etc/hyperledger/fabric-ca-server
    networks:
      - settlement-network

  ca.clearing.settlement.com:
    container_name: ca.clearing.settlement.com
    image: hyperledger/fabric-ca:1.5
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-clearing
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=10054
    ports:
      - 10054:10054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../organizations/clearingOrg/ca:/etc/hyperledger/fabric-ca-server
    networks:
      - settlement-network

  ca.regulator.settlement.com:
    container_name: ca.regulator.settlement.com
    image: hyperledger/fabric-ca:1.5
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=ca-regulator
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=11054
    ports:
      - 11054:11054
    command: sh -c 'fabric-ca-server start -b admin:adminpw -d'
    volumes:
      - ../organizations/regulatorOrg/ca:/etc/hyperledger/fabric-ca-server
    networks:
      - settlement-network

  # ---------------------------------------------------------------------------
  # CouchDB State Databases
  # ---------------------------------------------------------------------------
  couchdb.exchange:
    container_name: couchdb.exchange
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 5984:5984
    networks:
      - settlement-network

  couchdb.broker:
    container_name: couchdb.broker
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 6984:5984
    networks:
      - settlement-network

  couchdb.bank:
    container_name: couchdb.bank
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 7984:5984
    networks:
      - settlement-network

  couchdb.clearing:
    container_name: couchdb.clearing
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 8984:5984
    networks:
      - settlement-network

  couchdb.regulator:
    container_name: couchdb.regulator
    image: couchdb:3.3
    environment:
      - COUCHDB_USER=admin
      - COUCHDB_PASSWORD=adminpw
    ports:
      - 9984:5984
    networks:
      - settlement-network

  # ---------------------------------------------------------------------------
  # Peer Nodes
  # ---------------------------------------------------------------------------
  peer0.exchange.settlement.com:
    container_name: peer0.exchange.settlement.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=settlement-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.exchange.settlement.com
      - CORE_PEER_ADDRESS=peer0.exchange.settlement.com:7051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:7051
      - CORE_PEER_CHAINCODEADDRESS=peer0.exchange.settlement.com:7052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:7052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.exchange.settlement.com:7051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.exchange.settlement.com:7051
      - CORE_PEER_LOCALMSPID=ExchangeMSP
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.exchange:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/exchangeOrg/peers/peer0.exchange.settlement.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/exchangeOrg/peers/peer0.exchange.settlement.com/tls:/etc/hyperledger/fabric/tls
      - peer0.exchange.settlement.com:/var/hyperledger/production
    ports:
      - 7051:7051
    depends_on:
      - couchdb.exchange
    networks:
      - settlement-network

  peer0.broker.settlement.com:
    container_name: peer0.broker.settlement.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=settlement-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.broker.settlement.com
      - CORE_PEER_ADDRESS=peer0.broker.settlement.com:8051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:8051
      - CORE_PEER_CHAINCODEADDRESS=peer0.broker.settlement.com:8052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:8052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.broker.settlement.com:8051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.broker.settlement.com:8051
      - CORE_PEER_LOCALMSPID=BrokerMSP
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.broker:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/brokerOrg/peers/peer0.broker.settlement.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/brokerOrg/peers/peer0.broker.settlement.com/tls:/etc/hyperledger/fabric/tls
      - peer0.broker.settlement.com:/var/hyperledger/production
    ports:
      - 8051:8051
    depends_on:
      - couchdb.broker
    networks:
      - settlement-network

  peer0.bank.settlement.com:
    container_name: peer0.bank.settlement.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=settlement-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.bank.settlement.com
      - CORE_PEER_ADDRESS=peer0.bank.settlement.com:9051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:9051
      - CORE_PEER_CHAINCODEADDRESS=peer0.bank.settlement.com:9052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:9052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.bank.settlement.com:9051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.bank.settlement.com:9051
      - CORE_PEER_LOCALMSPID=BankMSP
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.bank:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/bankOrg/peers/peer0.bank.settlement.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/bankOrg/peers/peer0.bank.settlement.com/tls:/etc/hyperledger/fabric/tls
      - peer0.bank.settlement.com:/var/hyperledger/production
    ports:
      - 9051:9051
    depends_on:
      - couchdb.bank
    networks:
      - settlement-network

  peer0.clearing.settlement.com:
    container_name: peer0.clearing.settlement.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=settlement-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.clearing.settlement.com
      - CORE_PEER_ADDRESS=peer0.clearing.settlement.com:10051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:10051
      - CORE_PEER_CHAINCODEADDRESS=peer0.clearing.settlement.com:10052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:10052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.clearing.settlement.com:10051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.clearing.settlement.com:10051
      - CORE_PEER_LOCALMSPID=ClearingMSP
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.clearing:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/clearingOrg/peers/peer0.clearing.settlement.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/clearingOrg/peers/peer0.clearing.settlement.com/tls:/etc/hyperledger/fabric/tls
      - peer0.clearing.settlement.com:/var/hyperledger/production
    ports:
      - 10051:10051
    depends_on:
      - couchdb.clearing
    networks:
      - settlement-network

  peer0.regulator.settlement.com:
    container_name: peer0.regulator.settlement.com
    image: hyperledger/fabric-peer:2.5
    environment:
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - CORE_VM_DOCKER_HOSTCONFIG_NETWORKMODE=settlement-network
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_PROFILE_ENABLED=false
      - CORE_PEER_TLS_CERT_FILE=/etc/hyperledger/fabric/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/etc/hyperledger/fabric/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/etc/hyperledger/fabric/tls/ca.crt
      - CORE_PEER_ID=peer0.regulator.settlement.com
      - CORE_PEER_ADDRESS=peer0.regulator.settlement.com:11051
      - CORE_PEER_LISTENADDRESS=0.0.0.0:11051
      - CORE_PEER_CHAINCODEADDRESS=peer0.regulator.settlement.com:11052
      - CORE_PEER_CHAINCODELISTENADDRESS=0.0.0.0:11052
      - CORE_PEER_GOSSIP_BOOTSTRAP=peer0.regulator.settlement.com:11051
      - CORE_PEER_GOSSIP_EXTERNALENDPOINT=peer0.regulator.settlement.com:11051
      - CORE_PEER_LOCALMSPID=RegulatorMSP
      - CORE_LEDGER_STATE_STATEDATABASE=CouchDB
      - CORE_LEDGER_STATE_COUCHDBCONFIG_COUCHDBADDRESS=couchdb.regulator:5984
      - CORE_LEDGER_STATE_COUCHDBCONFIG_USERNAME=admin
      - CORE_LEDGER_STATE_COUCHDBCONFIG_PASSWORD=adminpw
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: peer node start
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations/regulatorOrg/peers/peer0.regulator.settlement.com/msp:/etc/hyperledger/fabric/msp
      - ../organizations/regulatorOrg/peers/peer0.regulator.settlement.com/tls:/etc/hyperledger/fabric/tls
      - peer0.regulator.settlement.com:/var/hyperledger/production
    ports:
      - 11051:11051
    depends_on:
      - couchdb.regulator
    networks:
      - settlement-network

  # ---------------------------------------------------------------------------
  # CLI (for admin operations)
  # ---------------------------------------------------------------------------
  cli:
    container_name: cli
    image: hyperledger/fabric-tools:2.5
    tty: true
    stdin_open: true
    environment:
      - GOPATH=/opt/gopath
      - CORE_VM_ENDPOINT=unix:///host/var/run/docker.sock
      - FABRIC_LOGGING_SPEC=INFO
      - CORE_PEER_ID=cli
      - CORE_PEER_ADDRESS=peer0.exchange.settlement.com:7051
      - CORE_PEER_LOCALMSPID=ExchangeMSP
      - CORE_PEER_TLS_ENABLED=true
      - CORE_PEER_TLS_CERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/exchangeOrg/peers/peer0.exchange.settlement.com/tls/server.crt
      - CORE_PEER_TLS_KEY_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/exchangeOrg/peers/peer0.exchange.settlement.com/tls/server.key
      - CORE_PEER_TLS_ROOTCERT_FILE=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/exchangeOrg/peers/peer0.exchange.settlement.com/tls/ca.crt
      - CORE_PEER_MSPCONFIGPATH=/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations/exchangeOrg/users/Admin@exchange.settlement.com/msp
    working_dir: /opt/gopath/src/github.com/hyperledger/fabric/peer
    command: /bin/bash
    volumes:
      - /var/run/docker.sock:/host/var/run/docker.sock
      - ../organizations:/opt/gopath/src/github.com/hyperledger/fabric/peer/organizations
      - ../chaincode:/opt/gopath/src/github.com/hyperledger/fabric/peer/chaincode
      - ../scripts:/opt/gopath/src/github.com/hyperledger/fabric/peer/scripts
    depends_on:
      - peer0.exchange.settlement.com
      - peer0.broker.settlement.com
      - peer0.bank.settlement.com
      - peer0.clearing.settlement.com
      - peer0.regulator.settlement.com
    networks:
      - settlement-network
